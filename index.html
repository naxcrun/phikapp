<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PHIKAPP</title>
    
    <link rel="icon" type="image/png" href="PHIKAPP.png">
    <link rel="apple-touch-icon" href="PHIKAPP.png">
    
<style>
        /* 1. Default styling (Light Mode) */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            position: fixed; 
            overflow: hidden; 
            
            /* THE MAGIC FIX: Stops pull-to-refresh and rubber-banding */
            overscroll-behavior-y: none; 
            
            /* Prevents double-tap to zoom */
            touch-action: none; 
            
            background-color: #FFFFFF; 
        }
        
        /* 2. Dark Mode Override */
        @media (prefers-color-scheme: dark) {
            body, html {
                background-color: #1d0c0b; 
            }
        }
        
        /* 3. The App Container */
        .app-container { 
            position: absolute; 
            top: 0; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            padding-top: env(safe-area-inset-top); 
            padding-bottom: env(safe-area-inset-bottom); 
            box-sizing: border-box; 
            
            /* Prevents accidental text selection if they tap outside the iframe */
            -webkit-user-select: none; 
            user-select: none; 
        }
        
        /* 4. The iframe */
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block; 
        }
    </style>
<script>
        // Prevent bounce and pull-to-refresh on older iOS devices
        document.addEventListener('touchmove', function(event) {
            // Only prevent default if the target isn't inside the iframe
            if (event.target.tagName !== 'IFRAME') {
                event.preventDefault();
            }
        }, { passive: false });
    </script>
</head>
<body>
    <div class="app-container">
        <iframe 
            src="https://apps.powerapps.com/play/388e0f6f-c408-4819-8e4d-4d3775f26f42?tenantId=4130bd39-7c53-419c-b1e5-8758d6d63f21&source=portal&hidenavbar=true"
            title="PhiKAPP Portal"
            allow="geolocation; microphone; camera; fullscreen">
        </iframe>
    </div>
</body>
</html>
